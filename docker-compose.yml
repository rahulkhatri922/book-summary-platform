# Full stack: Django API + React (nginx) + PostgreSQL.
# `docker compose up --build` then open http://localhost:8080

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-booksummaries}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 12
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-insecure-change-me}
      DEBUG: ${DEBUG:-1}
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:8080,http://localhost:5173
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-booksummaries}
      MEDIUM_API_BASE: https://api.medium.com/v1
      MEDIUM_MOCK: ${MEDIUM_MOCK:-1}
      SEED_ON_START: ${SEED_ON_START:-1}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
